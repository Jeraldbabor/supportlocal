[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_pgsql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.gd", "php83Extensions.opcache", "nodejs_20"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci",
    "npm run build",
    "php artisan view:cache"
]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan storage:link && php -d upload_max_filesize=20M -d post_max_size=25M -d memory_limit=256M artisan serve --host=0.0.0.0 --port=${PORT:-8080}"

[variables]
PHP_OPCACHE_ENABLE = "1"
PHP_OPCACHE_MEMORY_CONSUMPTION = "128"
PHP_OPCACHE_MAX_ACCELERATED_FILES = "10000"
PHP_OPCACHE_VALIDATE_TIMESTAMPS = "0"
